version: "3.9"

# ── Dear Adeline 2.0 — Full Stack Orchestration ───────────────────────────────
# Services:
#   postgres      → Hippocampus vector store     (pgvector, port 5432)
#   neo4j         → GraphRAG knowledge graph      (ports 7474, 7687)
#   redis         → Rate-limiting & auth sessions (port 6379)
#   adeline-brain → FastAPI Intelligence Layer    (port 8000)
#   adeline-ui    → Next.js Experience Layer      (port 3000)

networks:
  adeline-net:
    driver: bridge

volumes:
  postgres-data:
  neo4j-data:
  redis-data:

services:

  # ── Hippocampus (pgvector) ──────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: adeline-hippocampus
    restart: unless-stopped
    environment:
      POSTGRES_USER: adeline
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-placeholder_password}
      POSTGRES_DB: hippocampus
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - adeline-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adeline -d hippocampus"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── GraphRAG (Neo4j) ────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.20-community
    container_name: adeline-graphrag
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-placeholder_password}
      NEO4J_PLUGINS: '["apoc","graph-data-science"]'
    volumes:
      - neo4j-data:/data
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    networks:
      - adeline-net
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-placeholder_password}", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Redis (rate-limiting + auth sessions) ───────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: adeline-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-placeholder_password}
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - adeline-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-placeholder_password}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── adeline-brain (FastAPI Intelligence Layer) ──────────────────────────────
  adeline-brain:
    build:
      context: ./adeline-brain
      dockerfile: Dockerfile
    container_name: adeline-brain
    restart: unless-stopped
    environment:
      POSTGRES_DSN: postgresql://adeline:${POSTGRES_PASSWORD:-placeholder_password}@postgres:5432/hippocampus
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-placeholder_password}
      REDIS_URL: redis://:${REDIS_PASSWORD:-placeholder_password}@redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-placeholder_key}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
    ports:
      - "8000:8000"
    networks:
      - adeline-net
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── adeline-ui (Next.js Experience Layer) ───────────────────────────────────
  adeline-ui:
    build:
      context: .
      dockerfile: adeline-ui/Dockerfile
    container_name: adeline-ui
    restart: unless-stopped
    environment:
      BRAIN_INTERNAL_URL: http://adeline-brain:8000
    ports:
      - "3000:3000"
    networks:
      - adeline-net
    depends_on:
      adeline-brain:
        condition: service_healthy
